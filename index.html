            async renderCategoryList() {
                const cats = await this.db.getAllCategories();
                this.els.categoryList.innerHTML = '';
                cats.forEach((c, index) => {
                    const div = document.createElement('div');
                    div.style.display = 'flex';
                    div.style.alignItems = 'center';
                    div.style.gap = '4px';
                    div.style.padding = '8px 0';
                    div.style.borderBottom = '1px solid var(--border-color)';
                    div.innerHTML = `
                        <div style="display:flex; flex-direction:column; margin-right:4px;">
                            <button class="icon-btn up-btn" data-id="${c.id}" style="height:20px; font-size:12px;" ${index === 0 ? 'disabled' : ''}><i class="fas fa-caret-up"></i></button>
                            <button class="icon-btn down-btn" data-id="${c.id}" style="height:20px; font-size:12px;" ${index === cats.length - 1 ? 'disabled' : ''}><i class="fas fa-caret-down"></i></button>
                        </div>
                        <input type="color" class="cat-color-input" value="${c.color}" data-id="${c.id}" style="width:28px;height:28px;border:none;cursor:pointer;background:transparent;">
                        <input type="text" class="cat-name-input" value="${c.name}" data-id="${c.id}" style="flex:1;padding:4px;border:1px solid transparent;background:transparent;color:var(--text-primary);">
                        <button class="icon-btn delete-category" data-id="${c.id}" title="删除"><i class="fas fa-trash"></i></button>
                    `;
                    this.els.categoryList.appendChild(div);
                });
                this.bindCategoryListEvents();
            }

            bindCategoryListEvents() {
                this.els.categoryList.querySelectorAll('.up-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        if (btn.disabled) return;
                        await this.swapCategoryOrder(btn.dataset.id, -1);
                    });
                });
                this.els.categoryList.querySelectorAll('.down-btn').forEach(btn => {
                    btn.addEventListener('click', async () => {
                        if (btn.disabled) return;
                        await this.swapCategoryOrder(btn.dataset.id, 1);
                    });
                });
                this.els.categoryList.querySelectorAll('.cat-color-input').forEach(input => {
                    input.addEventListener('change', async (e) => {
                        const id = e.target.dataset.id;
                        const color = e.target.value;
                        const cats = await this.db.getAllCategories();
                        const cat = cats.find(c => c.id === id);
                        if (cat) {
                            cat.color = color;
                            await this.db.saveCategory(cat);
                            this.renderCategories();
                        }
                    });
                });
                this.els.categoryList.querySelectorAll('.cat-name-input').forEach(input => {
                    input.addEventListener('blur', async (e) => {
                        const id = e.target.dataset.id;
                        const name = e.target.value.trim();
                        if (!name) {
                            alert('分类名称不能为空');
                            this.renderCategoryList();
                            return;
                        }
                        const cats = await this.db.getAllCategories();
                        const cat = cats.find(c => c.id === id);
                        if (cat && cat.name !== name) {
                            cat.name = name;
                            await this.db.saveCategory(cat);
                            this.renderCategories();
                        }
                    });
                });
                this.els.categoryList.querySelectorAll('.delete-category').forEach(btn => {
                    btn.addEventListener('click', () => this.deleteCategory(btn.dataset.id));
                });
            }

            async swapCategoryOrder(id, direction) {
                const cats = await this.db.getAllCategories();
                const index = cats.findIndex(c => c.id === id);
                if (index === -1) return;
                const targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= cats.length) return;
                const currentCat = cats[index];
                const targetCat = cats[targetIndex];
                const tempOrder = currentCat.order;
                currentCat.order = targetCat.order;
                targetCat.order = tempOrder;
                await this.db.saveCategory(currentCat);
                await this.db.saveCategory(targetCat);
                this.renderCategories();
            }

            async deleteCategory(id) {
                if (!confirm('删除分类会将相关笔记归类到"其他"，确定删除吗？')) return;
                const notes = await this.db.getAllNotes();
                for (let note of notes) {
                    if (note.category === id) {
                        note.category = 'other';
                        await this.db.saveNote(note);
                    }
                }
                await this.db.deleteCategory(id);
                this.renderCategories();
                this.renderNotes();
            }

            // ===== 笔记列表 =====
            async renderNotes() {
                let notes = await this.db.getAllNotes();
                if (this.currentFilter !== 'all') notes = notes.filter(n => n.category === this.currentFilter);
                const search = this.els.searchInput.value.trim().toLowerCase();
                if (search) {
                    notes = notes.filter(n => {
                        const text = (n.title || '').toLowerCase() + ' ' + (extractText(n.content) || '').toLowerCase();
                        return text.includes(search);
                    });
                }
                this.els.clearSearch.style.display = this.els.searchInput.value.trim() ? 'block' : 'none';

                this.els.notesList.innerHTML = '';
                if (notes.length === 0) {
                    this.els.notesList.innerHTML = `<div class="empty-state"><i class="fas fa-book-open"></i><p>暂无笔记</p></div>`;
                    return;
                }

                const categories = await this.db.getAllCategories();
                const categoryMap = {};
                categories.forEach(c => { categoryMap[c.id] = c.name; });

                notes.forEach(n => {
                    const div = document.createElement('div');
                    div.className = 'note-item';
                    const preview = extractText(n.content).substring(0, 100);
                    const categoryName = categoryMap[n.category] || '未分类';
                    div.innerHTML = `
                        <div class="note-title">${escapeHtml(n.title || '未命名')}</div>
                        <div class="note-content-preview">${escapeHtml(preview)}</div>
                        <div class="note-footer">
                            <span class="note-time">${formatDate(n.updatedAt)}</span>
                            <span class="note-category">${escapeHtml(categoryName)}</span>
                        </div>
                    `;
                    div.addEventListener('click', () => this.openEditor(n.id));
                    this.els.notesList.appendChild(div);
                });
            }

            // ===== 编辑器 =====
            bindEditorEvents() {
                this.els.toolbar.querySelectorAll('[data-action]').forEach(btn => {
                    btn.addEventListener('mousedown', e => e.preventDefault());
                    btn.addEventListener('click', () => {
                        if (!this.editor) return;
                        this.executeAction(btn.dataset.action);
                    });
                });

                this.els.textColorPicker.addEventListener('input', e => {
                    if (!this.editor) return;
                    this.editor.chain().focus().setColor(e.target.value).run();
                });
                this.els.textBgColorPicker.addEventListener('input', e => {
                    if (!this.editor) return;
                    this.editor.chain().focus().setHighlight({ color: e.target.value }).run();
                });
                this.els.fontSizeSelect.addEventListener('change', e => {
                    if (!this.editor) return;
                    this.editor.chain().focus().setMark('fontSize', { fontSize: e.target.value + 'px' }).run();
                });

                this.els.timestampBtn.addEventListener('click', () => {
                    const visible = this.els.timestampToolbar.style.display === 'flex';
                    this.els.timestampToolbar.style.display = visible ? 'none' : 'flex';
                });
                this.els.timestampToolbar.addEventListener('click', (e) => {
                    const btn = e.target.closest('.timestamp-btn');
                    if (btn) this.handleTimestampInsert(btn.dataset.format);
                });

                this.els.toggleToolbarBtn.addEventListener('click', () => {
                    const isHidden = this.els.toolbar.style.display === 'none' || getComputedStyle(this.els.toolbar)
                        .display === 'none';
                    if (isHidden) {
                        this.els.toolbar.style.display = 'flex';
                        this.els.toggleToolbarText.innerText = '隐藏格式工具栏';
                        this.els.toggleToolbarBtn.querySelector('i').className = 'fas fa-chevron-up';
                    } else {
                        this.els.toolbar.style.display = 'none';
                        this.els.toggleToolbarText.innerText = '显示格式工具栏';
                        this.els.toggleToolbarBtn.querySelector('i').className = 'fas fa-pen-fancy';
                    }
                });
            }

            async openEditor(id = null) {
                this.editingId = id;
                const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
                this.els.editorContainer.style.height = `${vh}px`;
                this.els.editorContainer.classList.add('active');
                const scrollY = window.scrollY;
                document.body.style.position = 'fixed';
                document.body.style.top = `-${scrollY}px`;
                document.body.style.left = '0';
                document.body.style.right = '0';
                document.body.style.width = '100%';

                let content = { type: 'doc', content: [{ type: 'paragraph' }] };
                let title = '';
                let category = 'daily';

                if (id) {
                    const note = await this.db.getNote(id);
                    if (note) {
                        title = note.title || '';
                        content = note.content || content;
                        category = note.category || category;
                    }
                }

                this.els.noteTitleInput.value = title;
                this.els.categorySelect.value = category;

                if (!this.editor) {
                    this.editor = new Editor({
                        element: document.getElementById('tiptap-editor'),
                        extensions: [
                            StarterKit.configure({ heading: { levels: [1, 2, 3] } }),
                            Underline, TextStyle,
                            Color.configure({ types: ['textStyle'] }),
                            Highlight.configure({ multicolor: true }),
                            TextAlign.configure({ types: ['heading', 'paragraph'], alignments: ['left', 'center',
                                    'right'
                                ] }),
                            ImageExtension.configure({ allowBase64: true }),
                            FontSize, Indent,
                            Placeholder.configure({ placeholder: '开始记录...' })
                        ],
                        content: content,
                        editorProps: {
                            attributes: { class: 'ProseMirror' },
                            handlePaste: (view, event) => {
                                const items = event.clipboardData?.items;
                                if (items) {
                                    for (let item of items) {
                                        if (item.type.startsWith('image/')) {
                                            const file = item.getAsFile();
                                            if (file) {
                                                this.handleImageFile(file);
                                                event.preventDefault();
                                                return true;
                                            }
                                        }
                                    }
                                }
                                return false;
                            }
                        },
                        onUpdate: () => { this.triggerAutoSave();
                            this.updateToolbarState(); },
                        onSelectionUpdate: () => { this.updateToolbarState(); }
                    });
                } else {
                    this.editor.commands.setContent(content);
                }
                this.lastSavedContent = JSON.stringify(this.editor.getJSON());
                this.updateToolbarState();
                setTimeout(() => this.editor.commands.focus(), 300);
            }

            closeEditor(shouldSave = true) {
                if (shouldSave) this.saveNote(true);
                this.els.editorContainer.style.transform = '';
                this.els.editorContainer.classList.remove('active');
                this.editingId = null;
                this.els.timestampToolbar.style.display = 'none';
                const scrollY = parseInt(document.body.style.top || '0') * -1;
                document.body.style.position = '';
                document.body.style.top = '';
                document.body.style.left = '';
                document.body.style.right = '';
                document.body.style.width = '';
                window.scrollTo(0, scrollY);
            }

            async saveNote(force = false) {
                if (!this.editor) return;
                const currentContent = JSON.stringify(this.editor.getJSON());
                if (!force && currentContent === this.lastSavedContent) return;

                const noteData = {
                    id: this.editingId || Date.now().toString(),
                    title: this.els.noteTitleInput.value.trim() || '未命名笔记',
                    content: this.editor.getJSON(),
                    category: this.els.categorySelect.value,
                    updatedAt: new Date().toISOString()
                };

                try {
                    await this.db.saveNote(noteData);
                    this.lastSavedContent = currentContent;
                    if (!this.editingId) this.editingId = noteData.id;
                    this.els.autoSaveStatus.textContent = '已保存';
                    this.els.autoSaveStatus.classList.add('show');
                    setTimeout(() => this.els.autoSaveStatus.classList.remove('show'), 1500);
                    this.renderNotes();
                } catch (e) {
                    this.els.autoSaveStatus.textContent = '保存失败';
                    this.els.autoSaveStatus.classList.add('show');
                    console.error("保存笔记失败:", e);
                }
            }

            async deleteNote() {
                if (!this.editingId) { this.closeEditor(false); return; }
                if (confirm('确定删除此笔记？')) {
                    await this.db.deleteNote(this.editingId);
                    this.renderNotes();
                    this.closeEditor(false);
                }
            }

            executeAction(action) {
                if (!this.editor) return;
                const chain = this.editor.chain().focus();
                switch (action) {
                    case 'toggleBold':
                        chain.toggleBold().run();
                        break;
                    case 'toggleItalic':
                        chain.toggleItalic().run();
                        break;
                    case 'toggleUnderline':
                        chain.toggleUnderline().run();
                        break;
                    case 'toggleStrike':
                        chain.toggleStrike().run();
                        break;
                    case 'toggleCode':
                        chain.toggleCode().run();
                        break;
                    case 'unsetAllMarks':
                        chain.unsetAllMarks().run();
                        break;
                    case 'setHeading-1':
                        chain.setHeading({ level: 1 }).run();
                        break;
                    case 'setHeading-2':
                        chain.setHeading({ level: 2 }).run();
                        break;
                    case 'setHeading-3':
                        chain.setHeading({ level: 3 }).run();
                        break;
                    case 'setParagraph':
                        chain.setParagraph().run();
                        break;
                    case 'toggleBulletList':
                        chain.toggleBulletList().run();
                        break;
                    case 'toggleOrderedList':
                        chain.toggleOrderedList().run();
                        break;
                    case 'toggleBlockquote':
                        chain.toggleBlockquote().run();
                        break;
                    case 'toggleCodeBlock':
                        chain.toggleCodeBlock().run();
                        break;
                    case 'setTextAlign-left':
                        chain.setTextAlign('left').run();
                        break;
                    case 'setTextAlign-center':
                        chain.setTextAlign('center').run();
                        break;
                    case 'setTextAlign-right':
                        chain.setTextAlign('right').run();
                        break;
                    case 'indent':
                        chain.indent().run();
                        break;
                    case 'outdent':
                        chain.outdent().run();
                        break;
                    case 'insertImage':
                        this.insertImage();
                        break;
                }
                this.updateToolbarState();
                this.triggerAutoSave();
            }

            updateToolbarState() {
                if (!this.editor) return;
                const editor = this.editor;
                this.els.toolbar.querySelectorAll('[data-action]').forEach(btn => {
                    const action = btn.dataset.action;
                    let active = false;
                    if (action === 'toggleBold') active = editor.isActive('bold');
                    else if (action === 'toggleItalic') active = editor.isActive('italic');
                    else if (action === 'toggleUnderline') active = editor.isActive('underline');
                    else if (action === 'toggleStrike') active = editor.isActive('strike');
                    else if (action === 'toggleCode') active = editor.isActive('code');
                    else if (action.startsWith('setHeading-')) {
                        const level = parseInt(action.split('-')[1]);
                        active = editor.isActive('heading', { level });
                    } else if (action === 'setParagraph') active = editor.isActive('paragraph');
                    else if (action === 'toggleBulletList') active = editor.isActive('bulletList');
                    else if (action === 'toggleOrderedList') active = editor.isActive('orderedList');
                    else if (action === 'toggleBlockquote') active = editor.isActive('blockquote');
                    else if (action === 'toggleCodeBlock') active = editor.isActive('codeBlock');
                    else if (action.startsWith('setTextAlign-')) {
                        const align = action.split('-')[1];
                        active = editor.isActive({ textAlign: align });
                    }
                    btn.classList.toggle('is-active', active);
                });
            }

            triggerAutoSave() {
                clearTimeout(this.autoSaveTimer);
                this.els.autoSaveStatus.textContent = '编辑中...';
                this.els.autoSaveStatus.classList.add('show');
                this.autoSaveTimer = setTimeout(() => this.saveNote(), this.settings.autoSaveInterval);
            }

            handleTimestampInsert(format) {
                if (format === 'custom') {
                    this.showModal(this.els.customTimestampModal);
                    this.updateFormatPreview();
                } else {
                    this.insertTimestamp(format);
                }
            }

            insertTimestamp(format) {
                const timestamp = this.formatTimestamp(new Date(), this.getTimestampFormat(format));
                if (this.editor) {
                    this.editor.chain().focus().insertContent(timestamp).run();
                    this.triggerAutoSave();
                }
                this.els.timestampToolbar.style.display = 'none';
            }

            getTimestampFormat(format) {
                const map = {
                    datetime: 'YYYY年MM月DD日 HH:mm:ss',
                    date: 'YYYY年MM月DD日',
                    time: 'HH:mm:ss',
                    week: 'YYYY年MM月DD日 ddd',
                    custom: this.els.customFormatInput.value
                };
                return map[format] || map.datetime;
            }

            updateFormatPreview() {
                const format = this.els.customFormatInput.value;
                if (format.trim()) {
                    this.els.formatPreview.textContent = this.formatTimestamp(new Date(), format);
                }
            }

            formatTimestamp(date, format) {
                const d = new Date(date);
                const pad = n => n.toString().padStart(2, '0');
                const weekdays = ['星期日', '星期一', '星期二', '星期三', '星期四', '星期五', '星期六'];
                const repl = {
                    'YYYY': d.getFullYear(),
                    'MM': pad(d.getMonth() + 1),
                    'DD': pad(d.getDate()),
                    'HH': pad(d.getHours()),
                    'mm': pad(d.getMinutes()),
                    'ss': pad(d.getSeconds()),
                    'ddd': weekdays[d.getDay()]
                };
                let result = format;
                for (const [k, v] of Object.entries(repl)) {
                    result = result.replace(new RegExp(k, 'g'), v);
                }
                return result;
            }

            insertImage() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = 'image/*';
                input.onchange = async (e) => {
                    const file = e.target.files[0];
                    if (file) {
                        try {
                            const compressed = await compressImage(file);
                            await this.handleImageFile(compressed);
                        } catch (err) {
                            console.error('[图片] 插入过程出错:', err);
                        }
                    }
                    input.remove();
                };
                input.click();
            }

            handleImageFile(file) {
                return new Promise((resolve, reject) => {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        const dataUrl = ev.target.result;
                        if (this.editor) {
                            try {
                                this.editor.chain().focus().setImage({ src: dataUrl }).run();
                                this.triggerAutoSave();
                                resolve();
                            } catch (err) {
                                reject(err);
                            }
                        } else {
                            reject(new Error('编辑器未初始化'));
                        }
                    };
                    reader.onerror = () => reject(new Error('FileReader 读取失败'));
                    reader.readAsDataURL(file);
                });
            }

            // ===== 导入导出 =====
            async exportNotes(format) {
                let notes = await this.db.getAllNotes();
                const cleanNotes = notes.map(n => {
                    const { encryptedContent, ...rest } = n;
                    return rest;
                });
                const categories = await this.db.getAllCategories();

                if (format === 'json') {
                    const data = {
                        app: '素记日记',
                        version: '3.1',
                        exportDate: new Date().toISOString(),
                        noteCount: cleanNotes.length,
                        categories,
                        notes: cleanNotes
                    };
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    this.downloadBlob(blob, `素记日记_${new Date().toISOString().slice(0, 10)}.json`);
                } else {
                    let md = `# 素记日记 - 笔记导出\n\n- **导出时间**: ${this.formatTimestamp(new Date(), 'YYYY年MM月DD日 HH:mm:ss')}\n- **笔记总数**: ${cleanNotes.length}\n\n---\n\n`;
                    cleanNotes.forEach((n, i) => {
                        const cat = categories.find(c => c.id === n.category);
                        md += `## 笔记 ${i+1}: ${n.title}\n\n- **分类**: ${cat ? cat.name : n.category}\n- **更新**: ${this.formatTimestamp(new Date(n.updatedAt), 'YYYY年MM月DD日 HH:mm:ss')}\n\n---\n\n${extractText(n.content)}\n\n---\n\n`;
                    });
                    const blob = new Blob([md], { type: 'text/markdown' });
                    this.downloadBlob(blob, `素记日记_${new Date().toISOString().slice(0, 10)}.md`);
                }
            }

            downloadBlob(blob, filename) {
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
            }

            importJSON(file) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        let notes = [];
                        let categories = [];
                        if (data && typeof data === 'object' && !Array.isArray(data)) {
                            if (data.notes) notes = data.notes;
                            if (data.categories) categories = data.categories;
                        } else if (Array.isArray(data)) {
                            notes = data;
                        } else {
                            throw new Error('不支持的文件格式');
                        }
                        if (categories.length > 0) {
                            for (const c of categories) await this.db.saveCategory(c);
                            await this.renderCategories();
                        }
                        let count = 0;
                        for (const note of notes) {
                            let content = note.content;
                            if (typeof content === 'string') content = convertPlainToJSON(content);
                            const newNote = {
                                id: Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8) + '_' +
                                    count,
                                title: note.title || '未命名笔记',
                                content: content || { type: 'doc', content: [{ type: 'paragraph' }] },
                                category: note.category || 'daily',
                                createdAt: note.createdAt || new Date().toISOString(),
                                updatedAt: note.updatedAt || new Date().toISOString()
                            };
                            await this.db.saveNote(newNote);
                            count++;
                        }
                        alert(`成功导入 ${count} 条笔记${categories.length ? ` 和 ${categories.length} 个分类` : ''}`);
                        this.renderNotes();
                        this.renderCategories();
                    } catch (err) {
                        alert('导入失败: ' + err.message);
                    }
                };
                reader.readAsText(file);
            }

            importMarkdown(file) {
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const content = ev.target.result;
                    const lines = content.split('\n');
                    let currentNote = null,
                        count = 0;
                    for (const line of lines) {
                        if (line.startsWith('## 笔记')) {
                            if (currentNote) {
                                await this.saveCurrentNote(currentNote);
                                count++;
                            }
                            const match = line.match(/## 笔记 \d+: (.+)/);
                            currentNote = {
                                title: match ? match[1] : '未命名笔记',
                                content: '',
                                category: 'daily'
                            };
                        } else if (currentNote && line.trim() && !line.startsWith('- **')) {
                            currentNote.content += line + '\n';
                        }
                    }
                    if (currentNote) {
                        await this.saveCurrentNote(currentNote);
                        count++;
                    }
                    alert(`成功导入 ${count} 条笔记`);
                    this.renderNotes();
                };
                reader.readAsText(file);
            }

            async saveCurrentNote(note) {
                const content = convertPlainToJSON(note.content.trim());
                const newNote = {
                    id: Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8),
                    title: note.title,
                    content: content,
                    category: note.category || 'daily',
                    createdAt: new Date().toISOString(),
                    updatedAt: new Date().toISOString()
                };
                await this.db.saveNote(newNote);
            }

            // ===== 全局事件 =====
            bindGlobalEvents() {
                this.els.addButton.addEventListener('click', () => this.openEditor());

                this.els.closeEditor.addEventListener('click', () => this.closeEditor(true));
                this.els.saveNote.addEventListener('click', () => this.saveNote(true));
                this.els.deleteNote.addEventListener('click', () => this.deleteNote());

                this.els.searchBtn.addEventListener('click', () => {
                    const display = this.els.searchContainer.style.display;
                    this.els.searchContainer.style.display = display === 'none' ? 'block' : 'none';
                    if (display === 'none') this.els.searchInput.focus();
                });
                this.els.searchInput.addEventListener('input', () => this.renderNotes());
                this.els.clearSearch.addEventListener('click', () => {
                    this.els.searchInput.value = '';
                    this.renderNotes();
                });

                this.els.categoryManageBtn.addEventListener('click', async () => {
                    await this.renderCategoryList();
                    this.showModal(this.els.categoryManageModal);
                });
                this.els.closeCategoryManageModal.addEventListener('click', () => this.hideModal(this.els
                    .categoryManageModal));
                this.els.addNewCategoryBtn.addEventListener('click', async () => {
                    const name = this.els.newCategoryName.value.trim();
                    const color = this.els.newCategoryColor.value;
                    if (!name) return;
                    const cats = await this.db.getAllCategories();
                    const newOrder = cats.length > 0 ? Math.max(...cats.map(c => c.order || 0)) + 1 : 0;
                    await this.db.saveCategory({ id: 'cat_' + Date.now(), name, color, order: newOrder });
                    this.els.newCategoryName.value = '';
                    this.renderCategoryList();
                    this.renderCategories();
                });

                this.els.exportBtn.addEventListener('click', () => {
                    const display = this.els.exportSection.style.display;
                    this.els.exportSection.style.display = display === 'none' ? 'block' : 'none';
                    this.els.settingsSection.style.display = display === 'none' ? 'block' : 'none';
                });

                this.els.exportJsonBtn.addEventListener('click', () => this.exportNotes('json'));
                this.els.exportMarkdownBtn.addEventListener('click', () => this.exportNotes('markdown'));

                this.els.importJsonBtn.addEventListener('click', () => this.showModal(this.els.importModal));
                this.els.closeImportModal.addEventListener('click', () => this.hideModal(this.els.importModal));
                this.els.importJsonBtn2.addEventListener('click', () => {
                    this.hideModal(this.els.importModal);
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = '.json';
                    input.onchange = (e) => {
                        if (e.target.files[0]) this.importJSON(e.target.files[0]);
                    };
                    input.click();
                });
                this.els.importTxtBtn.addEventListener('click', () => {
                    this.hideModal(this.els.importModal);
                    const input = document.createElement('input');
                    input.type = 'file';
                    input.accept = '.md,.txt';
                    input.onchange = (e) => {
                        if (e.target.files[0]) this.importMarkdown(e.target.files[0]);
                    };
                    input.click();
                });

                this.els.backupBtn.addEventListener('click', async () => {
                    let notes = await this.db.getAllNotes();
                    const cleanNotes = notes.map(({ encryptedContent, ...rest }) => rest);
                    const cats = await this.db.getAllCategories();
                    const data = { timestamp: new Date().toISOString(), notes: cleanNotes, categories: cats };
                    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                    this.downloadBlob(blob, `素记备份_${new Date().toISOString().slice(0, 10)}.json`);
                });

                this.els.clearDataBtn.addEventListener('click', () => this.showModal(this.els.clearDataModal));
                this.els.closeClearDataModal.addEventListener('click', () => this.hideModal(this.els.clearDataModal));
                this.els.cancelClearData.addEventListener('click', () => this.hideModal(this.els.clearDataModal));
                this.els.confirmClearData.addEventListener('click', async () => {
                    await this.db.clearAll();
                    this.hideModal(this.els.clearDataModal);
                    this.renderNotes();
                    this.renderCategories();
                });

                this.els.categories.addEventListener('click', e => {
                    if (e.target.classList.contains('category-btn')) {
                        document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                        e.target.classList.add('active');
                        this.currentFilter = e.target.dataset.id;
                        this.renderNotes();
                    }
                });

                this.els.autoSaveIntervalInput.addEventListener('change', e => {
                    const val = parseInt(e.target.value);
                    if (val >= 1 && val <= 300) {
                        this.settings.autoSaveInterval = val * 1000;
                        this.db.setSetting('autoSaveInterval', this.settings.autoSaveInterval);
                    }
                });
                this.els.autoSaveShowStatus.addEventListener('change', e => {
                    this.settings.showAutoSaveStatus = e.target.checked;
                    this.db.setSetting('showAutoSaveStatus', this.settings.showAutoSaveStatus);
                });

                this.els.themeBtn.addEventListener('click', () => this.toggleTheme());

                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && this.els.editorContainer.classList.contains('active')) {
                        this.closeEditor(true);
                    }
                    if ((e.ctrlKey || e.metaKey) && e.key === 's' && this.els.editorContainer.classList.contains(
                        'active')) {
                        e.preventDefault();
                        this.saveNote(true);
                    }
                });

                this.els.closeCustomTimestampModal.addEventListener('click', () => this.hideModal(this.els
                    .customTimestampModal));
                this.els.cancelCustomTimestamp.addEventListener('click', () => this.hideModal(this.els
                    .customTimestampModal));
                this.els.insertCustomTimestamp.addEventListener('click', () => {
                    this.insertTimestamp('custom');
                    this.hideModal(this.els.customTimestampModal);
                });
                this.els.customFormatInput.addEventListener('input', () => this.updateFormatPreview());
                document.querySelectorAll('[data-preset]').forEach(btn => {
                    btn.addEventListener('click', () => {
                        this.els.customFormatInput.value = btn.dataset.preset;
                        this.updateFormatPreview();
                    });
                });
            }

            showModal(modal) { modal.classList.add('active'); }
            hideModal(modal) { modal.classList.remove('active'); }

            loadSettingsToUI() {
                this.db.getSetting('autoSaveInterval').then(val => {
                    if (val) {
                        this.settings.autoSaveInterval = val;
                        this.els.autoSaveIntervalInput.value = val / 1000;
                    }
                });
                this.db.getSetting('showAutoSaveStatus').then(val => {
                    if (val !== undefined) {
                        this.settings.showAutoSaveStatus = val;
                        this.els.autoSaveShowStatus.checked = val;
                    }
                });
            }

            toggleTheme() {
                const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
                document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
                localStorage.setItem('simpleNotesTheme', isDark ? 'light' : 'dark');
                this.els.themeBtn.innerHTML = isDark ? '<i class="fas fa-moon"></i>' : '<i class="fas fa-sun"></i>';
            }

            initTheme() {
                const saved = localStorage.getItem('simpleNotesTheme');
                const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                if (saved === 'dark' || (!saved && prefersDark)) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    this.els.themeBtn.innerHTML = '<i class="fas fa-sun"></i>';
                }
            }

            setupViewport() {
                if (window.visualViewport) {
                    const onResize = () => {
                        const vh = window.visualViewport.height;
                        document.documentElement.style.setProperty('--vh', `${vh}px`);
                        if (this.els.editorContainer.classList.contains('active')) {
                            this.els.editorContainer.style.height = `${vh}px`;
                        }
                    };
                    window.visualViewport.addEventListener('resize', onResize);
                    onResize();
                }

                let startX = 0,
                    currentX = 0,
                    isDragging = false;
                const ec = this.els.editorContainer;
                ec.addEventListener('touchstart', e => {
                    if (e.touches[0].clientX < 30) { isDragging = true;
                        startX = e.touches[0].clientX;
                        ec.classList.add('swiping'); }
                }, { passive: true });
                ec.addEventListener('touchmove', e => {
                    if (!isDragging) return;
                    currentX = e.touches[0].clientX;
                    const diff = currentX - startX;
                    if (diff > 0) ec.style.transform = `translateX(${diff}px)`;
                }, { passive: true });
                ec.addEventListener('touchend', () => {
                    if (!isDragging) return;
                    const diff = currentX - startX;
                    ec.classList.remove('swiping');
                    if (diff > 100) { this.closeEditor(true); } else { ec.style.transform = ''; }
                    isDragging = false;
                });
            }
        }

        // ===== 启动应用 =====
        document.addEventListener('DOMContentLoaded', () => {
            window.app = new App();
        });

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(() => {});
        }
    </script>
</body>
</html>
